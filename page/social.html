<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="图南工作室社交媒体 - 关注我们的官方社媒平台">
  <meta name="theme-color" content="#2D3436">
  
  <title>联系我们 - 图南工作室</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/styles.css">
  
  <script nomodule src="../js/bundle.min.js"></script>
</head>
<body>
  <a href="#main-content" class="skip-link">跳转到主要内容</a>
  
  <header class="navbar" role="banner">
    <nav class="navbar-container" role="navigation" aria-label="主导航">     
      <ul class="navbar-nav">
        <li><a href="/" class="nav-link" data-nav="home" data-i18n="nav.home">首页</a></li>
        <li><a href="/products" class="nav-link" data-nav="products" data-i18n="nav.products">产品介绍</a></li>
        <li><a href="/team" class="nav-link" data-nav="team" data-i18n="nav.team">团队介绍</a></li>
        <li><a href="/social" class="nav-link active" data-nav="social" data-i18n="nav.social">联系我们</a></li>
      </ul>
      
      <div class="navbar-actions">
        <div class="language-switcher" role="group" aria-label="语言切换">
          <button class="lang-btn active" data-lang="zh-CN" aria-label="切换到中文" aria-pressed="true">中文</button>
          <button class="lang-btn" data-lang="en" aria-label="Switch to English" aria-pressed="false">English</button>
        </div>
        
        <button class="mobile-menu-toggle" aria-label="打开菜单" aria-expanded="false" aria-controls="mobile-menu">
          <span class="menu-icon"></span>
        </button>
      </div>
    </nav>
    
    <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
      <ul class="mobile-nav">
        <li><a href="/" class="mobile-nav-link" data-nav="home" data-i18n="nav.home">首页</a></li>
        <li><a href="/products" class="mobile-nav-link" data-nav="products" data-i18n="nav.products">产品介绍</a></li>
        <li><a href="/team" class="mobile-nav-link" data-nav="team" data-i18n="nav.team">团队介绍</a></li>
        <li><a href="/social" class="mobile-nav-link active" data-nav="social" data-i18n="nav.social">联系我们</a></li>
      </ul>
      <div class="mobile-lang-switcher">
        <button class="lang-btn active" data-lang="zh-CN">中文</button>
        <button class="lang-btn" data-lang="en">English</button>
      </div>
    </div>
  </header>

  <main id="main-content" role="main">
    <section class="page social-page">
      <div class="container">
        <header class="page-header">
          <h1 class="page-title" data-i18n="social.title">关注我们</h1>
          <p class="page-subtitle" data-i18n="social.subtitle">欢迎关注我们的官方社媒平台，获取最新资讯和精彩内容</p>
        </header>
        
        <div class="social-grid" id="socialGrid">
          <article class="social-card" data-animate data-platform="bilibili">
            <a href="#" class="social-card-link" target="_blank" rel="noopener noreferrer" data-i18n-href="social.bilibili.link" data-i18n-aria-label="social.bilibili.ariaLabel">
              <div class="social-card-icon">
                <img src="../img/social/bilibili.svg" alt="B站" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <span class="social-icon-placeholder" style="display: none;">B</span>
              </div>
              <div class="social-card-content">
                <h2 class="social-platform-name" data-i18n="social.bilibili.name">哔哩哔哩</h2>
                <p class="social-platform-id" data-i18n="social.bilibili.id">官方账号</p>
                <p class="social-platform-desc" data-i18n="social.bilibili.desc">游戏视频、开发者日志、精彩预告</p>
              </div>
              <div class="social-card-arrow">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </a>
          </article>

          <article class="social-card" data-animate data-platform="xiaohongshu">
            <a href="#" class="social-card-link" target="_blank" rel="noopener noreferrer" data-i18n-href="social.xiaohongshu.link" data-i18n-aria-label="social.xiaohongshu.ariaLabel">
              <div class="social-card-icon">
                <img src="../img/social/xiaohongshu.svg" alt="小红书" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <span class="social-icon-placeholder" style="display: none;">红</span>
              </div>
              <div class="social-card-content">
                <h2 class="social-platform-name" data-i18n="social.xiaohongshu.name">小红书</h2>
                <p class="social-platform-id" data-i18n="social.xiaohongshu.id">官方账号</p>
                <p class="social-platform-desc" data-i18n="social.xiaohongshu.desc">幕后花絮、创作灵感、社区互动</p>
              </div>
              <div class="social-card-arrow">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </a>
          </article>

          <article class="social-card" data-animate data-platform="weibo">
            <a href="#" class="social-card-link" target="_blank" rel="noopener noreferrer" data-i18n-href="social.weibo.link" data-i18n-aria-label="social.weibo.ariaLabel">
              <div class="social-card-icon">
                <img src="../img/social/weibo.svg" alt="微博" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <span class="social-icon-placeholder" style="display: none;">微</span>
              </div>
              <div class="social-card-content">
                <h2 class="social-platform-name" data-i18n="social.weibo.name">微博</h2>
                <p class="social-platform-id" data-i18n="social.weibo.id">官方账号</p>
                <p class="social-platform-desc" data-i18n="social.weibo.desc">实时动态、热点资讯、粉丝福利</p>
              </div>
              <div class="social-card-arrow">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </a>
          </article>

          <article class="social-card" data-animate data-platform="douyin">
            <a href="#" class="social-card-link" target="_blank" rel="noopener noreferrer" data-i18n-href="social.douyin.link" data-i18n-aria-label="social.douyin.ariaLabel">
              <div class="social-card-icon">
                <img src="../img/social/douyin.svg" alt="抖音" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <span class="social-icon-placeholder" style="display: none;">抖</span>
              </div>
              <div class="social-card-content">
                <h2 class="social-platform-name" data-i18n="social.douyin.name">抖音</h2>
                <p class="social-platform-id" data-i18n="social.douyin.id">官方账号</p>
                <p class="social-platform-desc" data-i18n="social.douyin.desc">精彩短视频、游戏预告、直播活动</p>
              </div>
              <div class="social-card-arrow">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </a>
          </article>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="container">
      <p class="footer-copyright" data-i18n="footer.copyright">© 2024 图南工作室 TunanStudio. All rights reserved.</p>
      <nav class="footer-nav" aria-label="底部导航">
        <a href="#" class="footer-link" data-i18n="footer.privacy">隐私政策</a>
        <a href="#" class="footer-link" data-i18n="footer.terms">服务条款</a>
      </nav>
    </div>
  </footer>

  <script type="module" src="../script/main.js"></script>
</body>
</html>
